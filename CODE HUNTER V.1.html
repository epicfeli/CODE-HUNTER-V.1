<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeHunter · EasyFly Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0A1628;
  --bg-soft: #0F1F35;
  --bg-card: #162B47;
  --accent: #FF6B35;
  --accent-glow: #FF8C5A;
  --teal: #14B8A6;
  --teal-dark: #0D9488;
  --yellow: #FBBF24;
  --purple: #A78BFA;
  --text: #F1F5F9;
  --text-dim: #94A3B8;
  --text-faint: #64748B;
  --border: rgba(255, 255, 255, 0.08);
  --border-bright: rgba(255, 255, 255, 0.16);
  --red: #EF4444;
  --green: #10B981;
  --shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
}

body {
  font-family: 'Bricolage Grotesque', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Ambient background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 0%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(20, 184, 166, 0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* Grid texture */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 780px;
  margin: 0 auto;
  padding: 24px 20px 80px;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: rgba(15, 31, 53, 0.6);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 20px;
  margin-bottom: 24px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent) 0%, #FF4500 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
  font-size: 18px;
}

.logo-text {
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
}

.logo-text span {
  color: var(--accent);
}

.stats {
  display: flex;
  align-items: center;
  gap: 14px;
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
  font-size: 15px;
}

.stat-item .icon {
  font-size: 18px;
}

.lives {
  display: flex;
  gap: 2px;
}

.life {
  font-size: 18px;
  transition: all 0.3s;
}

.life.lost {
  filter: grayscale(1);
  opacity: 0.3;
  transform: scale(0.85);
}

/* ===== HOME SCREEN ===== */
.screen {
  animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero {
  text-align: center;
  padding: 32px 16px 40px;
  position: relative;
}

.hero-badge {
  display: inline-block;
  padding: 6px 14px;
  background: rgba(20, 184, 166, 0.15);
  border: 1px solid rgba(20, 184, 166, 0.3);
  border-radius: 100px;
  font-size: 12px;
  font-weight: 600;
  color: var(--teal);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 20px;
}

.hero h1 {
  font-size: clamp(38px, 8vw, 56px);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1;
  margin-bottom: 14px;
}

.hero h1 .accent {
  background: linear-gradient(135deg, var(--accent) 0%, var(--yellow) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  font-size: 16px;
  color: var(--text-dim);
  max-width: 460px;
  margin: 0 auto 28px;
  line-height: 1.5;
}

/* ===== LEVEL MAP ===== */
.levels {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-top: 32px;
}

.level-card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  overflow: hidden;
}

.level-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(255, 107, 53, 0.03) 100%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.level-card:hover:not(.locked) {
  transform: translateY(-2px);
  border-color: var(--border-bright);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
}

.level-card:hover:not(.locked)::before {
  opacity: 1;
}

.level-card.locked {
  opacity: 0.4;
  cursor: not-allowed;
}

.level-card.completed {
  border-color: rgba(16, 185, 129, 0.3);
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(16, 185, 129, 0.05) 100%);
}

.level-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  color: var(--accent);
  min-width: 50px;
  letter-spacing: -0.02em;
}

.level-card.locked .level-num {
  color: var(--text-faint);
}

.level-info {
  flex: 1;
}

.level-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}

.level-desc {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.4;
}

.level-status {
  font-size: 24px;
  min-width: 32px;
  text-align: center;
}

.level-badge {
  position: absolute;
  top: 12px;
  right: 14px;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.badge-new {
  background: var(--accent);
  color: white;
}

.badge-done {
  background: var(--green);
  color: white;
}

.badge-locked {
  background: var(--bg-soft);
  color: var(--text-faint);
}

/* ===== PLAY SCREEN ===== */
.play-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.btn-back {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  width: 40px;
  height: 40px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.btn-back:hover {
  border-color: var(--border-bright);
  background: var(--bg-soft);
}

.progress-bar {
  flex: 1;
  height: 12px;
  background: var(--bg-card);
  border-radius: 100px;
  overflow: hidden;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent) 0%, var(--yellow) 100%);
  border-radius: 100px;
  transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 0 16px rgba(255, 107, 53, 0.4);
}

.question-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 28px 24px;
  margin-bottom: 24px;
}

.question-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.question-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: rgba(20, 184, 166, 0.1);
  border: 1px solid rgba(20, 184, 166, 0.25);
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  color: var(--teal);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.btn-hint {
  background: rgba(251, 191, 36, 0.1);
  border: 1px solid rgba(251, 191, 36, 0.3);
  color: var(--yellow);
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: inherit;
  transition: all 0.2s;
}

.btn-hint:hover:not(:disabled) {
  background: rgba(251, 191, 36, 0.15);
  border-color: var(--yellow);
}

.btn-hint:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.question-context {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 16px;
  line-height: 1.5;
  padding: 12px 14px;
  background: rgba(255, 255, 255, 0.02);
  border-left: 3px solid var(--teal);
  border-radius: 0 8px 8px 0;
}

.question-context strong {
  color: var(--text);
  font-weight: 600;
}

.question-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 16px;
  letter-spacing: -0.01em;
  line-height: 1.3;
}

.code-block {
  background: #051020;
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 14px;
  padding: 18px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13.5px;
  line-height: 1.7;
  overflow-x: auto;
  margin-bottom: 20px;
  position: relative;
}

.code-block::before {
  content: '● ● ●';
  display: block;
  color: rgba(255, 255, 255, 0.15);
  letter-spacing: 4px;
  font-size: 10px;
  margin-bottom: 10px;
}

.code-block pre {
  font-family: inherit;
  white-space: pre;
  color: #CBD5E1;
}

.code-kw { color: #F472B6; font-weight: 500; }
.code-str { color: #86EFAC; }
.code-num { color: #FDBA74; }
.code-cmt { color: #64748B; font-style: italic; }
.code-fn { color: #93C5FD; }
.code-var { color: #E2E8F0; }
.code-op { color: #F472B6; }
.code-highlight { background: rgba(239, 68, 68, 0.15); border-radius: 3px; padding: 0 3px; }

.hint-box {
  background: rgba(251, 191, 36, 0.08);
  border: 1px solid rgba(251, 191, 36, 0.25);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 20px;
  font-size: 13px;
  color: var(--yellow);
  line-height: 1.5;
  animation: slideDown 0.3s ease-out;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.hint-box strong {
  font-weight: 700;
}

.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.option {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 16px 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  font-family: inherit;
  color: var(--text);
  position: relative;
  overflow: hidden;
}

.option:hover:not(:disabled) {
  border-color: var(--accent);
  transform: translateY(-1px);
}

.option:disabled {
  cursor: not-allowed;
}

.option-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}

.option-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 3px;
}

.option-desc {
  font-size: 11.5px;
  color: var(--text-dim);
  line-height: 1.35;
}

.option.selected {
  border-color: var(--accent);
  background: rgba(255, 107, 53, 0.08);
}

.option.correct {
  border-color: var(--green);
  background: rgba(16, 185, 129, 0.12);
  animation: pulseGreen 0.5s ease-out;
}

.option.wrong {
  border-color: var(--red);
  background: rgba(239, 68, 68, 0.12);
  animation: shakeX 0.4s ease-out;
}

@keyframes pulseGreen {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}

@keyframes shakeX {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.option .tick {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 16px;
  opacity: 0;
}

.option.correct .tick {
  opacity: 1;
}

/* ===== FEEDBACK ===== */
.feedback {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  padding: 20px;
  animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 100;
}

.feedback.correct {
  background: linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, var(--bg-card) 100%);
  border-top-color: var(--green);
}

.feedback.wrong {
  background: linear-gradient(135deg, rgba(239, 68, 68, 0.15) 0%, var(--bg-card) 100%);
  border-top-color: var(--red);
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.feedback-inner {
  max-width: 740px;
  margin: 0 auto;
}

.feedback-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.feedback-icon {
  font-size: 28px;
}

.feedback-title {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.01em;
}

.feedback.correct .feedback-title { color: var(--green); }
.feedback.wrong .feedback-title { color: var(--red); }

.feedback-explanation {
  font-size: 14px;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 16px;
}

.feedback-explanation strong {
  color: var(--text);
  font-weight: 600;
}

.feedback-explanation code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: rgba(255, 255, 255, 0.06);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--accent);
}

.btn-continue {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-family: inherit;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
}

.btn-continue:hover {
  background: var(--accent-glow);
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(255, 107, 53, 0.4);
}

.feedback.wrong .btn-continue {
  background: var(--red);
  box-shadow: 0 4px 20px rgba(239, 68, 68, 0.3);
}

.feedback.wrong .btn-continue:hover {
  background: #DC2626;
}

/* ===== RESULT SCREEN ===== */
.result {
  text-align: center;
  padding: 40px 20px;
}

.result-emoji {
  font-size: 72px;
  margin-bottom: 16px;
  animation: bounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes bounce {
  0% { transform: scale(0); }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

.result h2 {
  font-size: 38px;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}

.result .subtitle {
  font-size: 16px;
  color: var(--text-dim);
  margin-bottom: 32px;
}

.result-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}

.result-stat {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 12px;
}

.result-stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent) 0%, var(--yellow) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}

.result-stat-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.btn-primary, .btn-secondary {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-family: inherit;
  transition: all 0.2s;
  margin-bottom: 10px;
  border: none;
}

.btn-primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
}

.btn-primary:hover {
  background: var(--accent-glow);
  transform: translateY(-1px);
}

.btn-secondary {
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  border-color: var(--border-bright);
}

/* ===== GAME OVER ===== */
.game-over {
  text-align: center;
  padding: 40px 20px;
}

.game-over .result-emoji {
  filter: grayscale(0.3);
}

/* ===== MOBILE ===== */
@media (max-width: 520px) {
  .options { grid-template-columns: 1fr; }
  .hero h1 { font-size: 36px; }
  .question-title { font-size: 17px; }
  .code-block { font-size: 12px; padding: 14px 16px; }
  .stat-item { font-size: 13px; }
  .stat-item .icon { font-size: 16px; }
  .logo-text { font-size: 15px; }
  .logo-icon { width: 30px; height: 30px; font-size: 15px; }
}

/* ===== CONFETTI ===== */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: -10px;
  pointer-events: none;
  animation: confettiFall linear forwards;
  z-index: 1000;
}

@keyframes confettiFall {
  to {
    transform: translateY(100vh) rotate(720deg);
    opacity: 0;
  }
}

/* ===== LOADING STATE ===== */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-size: 14px;
}

/* ===== COMBO STREAK ===== */
.streak-flash {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: linear-gradient(135deg, var(--accent) 0%, var(--yellow) 100%);
  color: white;
  padding: 20px 40px;
  border-radius: 20px;
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.01em;
  z-index: 200;
  box-shadow: 0 20px 60px rgba(255, 107, 53, 0.5);
  pointer-events: none;
}

.streak-flash.show {
  animation: streakPop 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes streakPop {
  0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); }
  20% { transform: translate(-50%, -50%) scale(1.1) rotate(5deg); }
  40% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
  80% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(0.8) rotate(0deg); opacity: 0; }
}
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">✈️</div>
      <div class="logo-text">Code<span>Hunter</span></div>
    </div>
    <div class="stats">
      <div class="stat-item">
        <span class="icon">🔥</span>
        <span id="streak">0</span>
      </div>
      <div class="stat-item">
        <span class="icon">💎</span>
        <span id="xp">0</span>
      </div>
      <div class="stat-item lives" id="lives"></div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main id="content"></main>
</div>

<div class="streak-flash" id="streakFlash"></div>

<script>
// ============================================================
// GAME DATA — Banks of exercises for each level
// Each exercise has multiple variants for replayability
// ============================================================

const EXERCISES = {
  // LEVEL 1 — BUGS básicos
  1: [
    {

// ============================================================
// STORAGE — persistence across sessions
// ============================================================

async function loadProgress() {
  try {
    const r = await window.storage.get('codehunter-progress');
    if (r) {
      const saved = JSON.parse(r.value);
      state.xp = saved.xp || 0;
      state.completed = saved.completed || {};
    }
  } catch(e) {
    // first time, no data
  }
}

async function saveProgress() {
  try {
    await window.storage.set('codehunter-progress', JSON.stringify({
      xp: state.xp,
      completed: state.completed
    }));
  } catch(e) {
    console.warn('Could not save progress');
  }
}

// ============================================================
// UI HELPERS
// ============================================================

function updateHeader() {
  document.getElementById('streak').textContent = state.streak;
  document.getElementById('xp').textContent = state.xp;
  
  const livesEl = document.getElementById('lives');
  livesEl.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const life = document.createElement('span');
    life.className = 'life' + (i >= state.lives ? ' lost' : '');
    life.textContent = '❤️';
    livesEl.appendChild(life);
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showStreakFlash(text) {
  const el = document.getElementById('streakFlash');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth; // trigger reflow
  el.classList.add('show');
}

function spawnConfetti() {
  const colors = ['#FF6B35', '#FBBF24', '#14B8A6', '#A78BFA', '#10B981'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.animationDelay = Math.random() * 0.5 + 's';
    c.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) {
      c.style.borderRadius = '50%';
    }
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

function renderHome() {
  state.screen = 'home';
  const content = document.getElementById('content');
  
  const levels = Object.keys(LEVEL_INFO).map(n => {
    const num = parseInt(n);
    const info = LEVEL_INFO[num];
    const done = state.completed[num];

    const locked = !prevDone;
    
    let badge = '';
    if (done) badge = '<div class="level-badge badge-done">✓ Completado</div>';
    else if (locked) badge = '<div class="level-badge badge-locked">🔒 Bloqueado</div>';
    else badge = '<div class="level-badge badge-new">▶ Jugar</div>';
    
    return `
      <div class="level-card ${done ? 'completed' : ''} ${locked ? 'locked' : ''}" 
           ${!locked ? `onclick="startLevel(${num})"` : ''}>
        ${badge}
        <div class="level-num">${String(num).padStart(2, '0')}</div>
        <div class="level-info">
          <div class="level-title">${info.icon} ${info.title}</div>
          <div class="level-desc">${info.desc}</div>
        </div>
        <div class="level-status">${done ? '⭐' : locked ? '🔒' : '→'}</div>
      </div>
    `;
  }).join('');
  
  content.innerHTML = `
    <div class="screen">
      <div class="hero">
        <div class="hero-badge">✈️ EasyFly Academy</div>
        <h1>Caza de<br><span class="accent">Código Malo</span></h1>
        <p>Identifica bugs, malos olores y deuda técnica como un revisor profesional. Basado en el caso real del Club EasyFly.</p>
      </div>
      <div class="levels">
        ${levels}
      </div>
    </div>
  `;
  
  updateHeader();
}

function startLevel(level) {
  state.level = level;
  state.lives = 3;
  state.currentIndex = 0;
  state.levelStats = { correct: 0, wrong: 0, hintsUsed: 0 };
  
  // Build queue: shuffle and take N exercises
  const pool = shuffle(EXERCISES[level]);
  state.exerciseQueue = pool.slice(0, Math.min(EXERCISES_PER_LEVEL, pool.length));
  
  renderExercise();
}

function renderExercise() {
  if (state.currentIndex >= state.exerciseQueue.length) {
    return renderLevelComplete();
  }
  
  if (state.lives <= 0) {
    return renderGameOver();
  }
  
  state.screen = 'play';
  state.hintUsed = false;
  state.locked = false;
  state.currentExercise = state.exerciseQueue[state.currentIndex];
  
  const ex = state.currentExercise;
  const progress = ((state.currentIndex) / state.exerciseQueue.length) * 100;
  
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="screen">
      <div class="play-header">
        <button class="btn-back" onclick="confirmExit()">←</button>
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${progress}%"></div>
        </div>
      </div>
      
      <div class="question-box">
        <div class="question-meta">
          <div class="question-tag">
            <span>Nivel ${state.level}</span>
            <span>·</span>
            <span>${state.currentIndex + 1}/${state.exerciseQueue.length}</span>
          </div>
          <button class="btn-hint" id="hintBtn" onclick="showHint()">
            💡 Pista
          </button>
        </div>
        
        <div class="question-context">${ex.context}</div>
        
        <div class="question-title">${ex.title}</div>
        
        <div class="code-block"><pre>${ex.code}</pre></div>
        
        <div id="hintContainer"></div>
        
        <div class="options" id="options">
          ${ex.options.map((opt, i) => renderOption(opt, i)).join('')}
        </div>
      </div>
    </div>
  `;
  
  updateHeader();
}

function renderOption(label, index) {
  const types = {
    0: { title: 'BUG', desc: 'Error en la lógica', label: 'URGENTE' },
    1: { title: 'MAL OLOR', desc: 'Funciona pero es feo', label: 'IMPORTANTE' },
    2: { title: 'DEUDA TÉCNICA', desc: 'Atajo que se cobra', label: 'ESTRATÉGICO' },
    3: { title: 'TODO CORRECTO', desc: 'Código limpio', label: 'OK' }
  };
  const t = types[index];
  
  return `
    <button class="option" onclick="selectOption(${index})" data-index="${index}">
      <div class="option-label">${t.label}</div>
      <div class="option-title">${t.title}</div>
      <div class="option-desc">${t.desc}</div>
      <span class="tick">✓</span>
    </button>
  `;
}

function showHint() {
  if (state.hintUsed) return;
  state.hintUsed = true;
  state.levelStats.hintsUsed++;
  
  document.getElementById('hintBtn').disabled = true;
  document.getElementById('hintContainer').innerHTML = `
    <div class="hint-box">
      <strong>💡 Pista:</strong> ${state.currentExercise.hint}
    </div>
  `;
}

function selectOption(index) {
  if (state.locked) return;
  state.locked = true;
  
  const ex = state.currentExercise;
  const correct = index === ex.correct;
  const options = document.querySelectorAll('.option');
  
  options.forEach((opt, i) => {
    opt.disabled = true;
    if (i === index) opt.classList.add(correct ? 'correct' : 'wrong');
    if (i === ex.correct && !correct) opt.classList.add('correct');
  });
  
  if (correct) {
    state.levelStats.correct++;
    state.streak++;
    const xpGained = state.hintUsed ? 5 : 10;
    state.xp += xpGained;
    
    if (state.streak > 0 && state.streak % 3 === 0) {
      showStreakFlash(`🔥 ¡${state.streak} seguidas!`);
    }
  } else {
    state.levelStats.wrong++;
    state.streak = 0;
    state.lives--;
  }
  
  updateHeader();
  showFeedback(correct);
}

function showFeedback(correct) {
  const ex = state.currentExercise;
  const existing = document.querySelector('.feedback');
  if (existing) existing.remove();
  
  const fb = document.createElement('div');
  fb.className = 'feedback ' + (correct ? 'correct' : 'wrong');
  fb.innerHTML = `
    <div class="feedback-inner">
      <div class="feedback-header">
        <span class="feedback-icon">${correct ? '🎯' : '❌'}</span>
        <div class="feedback-title">${correct ? '¡Correcto!' : 'No era esa'}</div>
      </div>
      <div class="feedback-explanation">${ex.explanation}</div>
      <button class="btn-continue" onclick="nextExercise()">
        ${correct ? 'Continuar' : 'Entendido'}
      </button>
    </div>
  `;
  document.body.appendChild(fb);
}

function nextExercise() {
  const fb = document.querySelector('.feedback');
  if (fb) fb.remove();
  
  state.currentIndex++;
  renderExercise();
}

function renderLevelComplete() {
  state.screen = 'complete';
  
  const perfect = state.levelStats.wrong === 0;
  const noHints = state.levelStats.hintsUsed === 0;
  
  // Bonus XP
  let bonusXp = 0;
  if (perfect) bonusXp += 25;
  if (noHints && perfect) bonusXp += 15;
  state.xp += bonusXp;
  
  // Mark level as completed
  state.completed[state.level] = true;
  saveProgress();
  
  const accuracy = Math.round((state.levelStats.correct / state.exerciseQueue.length) * 100);
  
  let emoji, title, subtitle;
  if (perfect && noHints) {
    emoji = '🏆';
    title = '¡Perfecto!';
    subtitle = 'Sin errores, sin pistas. Eres un cazador profesional.';
  } else if (perfect) {
    emoji = '🎯';
    title = '¡Excelente!';
    subtitle = 'Completaste el nivel sin errores.';
  } else if (accuracy >= 60) {
    emoji = '💪';
    title = '¡Nivel superado!';
    subtitle = 'Sigue practicando para dominar cada tipo.';
  } else {
    emoji = '📚';
    title = 'Nivel completado';
    subtitle = 'Revisa las explicaciones y vuelve a intentarlo.';
  }
  
  if (perfect) spawnConfetti();
  
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="screen result">
      <div class="result-emoji">${emoji}</div>
      <h2>${title}</h2>
      <div class="subtitle">${subtitle}</div>
      
      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-value">${state.levelStats.correct}/${state.exerciseQueue.length}</div>
          <div class="result-stat-label">Aciertos</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${accuracy}%</div>
          <div class="result-stat-label">Precisión</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">+${state.xp - (state.xp - (state.levelStats.correct * 10 + bonusXp))}</div>
          <div class="result-stat-label">XP ganado</div>
        </div>
      </div>
      
      <button class="btn-primary" onclick="startLevel(${state.level})">Jugar de nuevo</button>
      ${state.level < 5 && state.completed[state.level] ? 
        `<button class="btn-primary" onclick="startLevel(${state.level + 1})" style="background: var(--teal); box-shadow: 0 4px 20px rgba(20, 184, 166, 0.3)">Siguiente nivel</button>` : ''}
      <button class="btn-secondary" onclick="renderHome()">Volver al menú</button>
    </div>
  `;
  
  updateHeader();
}

function renderGameOver() {
  state.screen = 'gameover';
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="screen game-over">
      <div class="result-emoji">💔</div>
      <h2>Te quedaste sin vidas</h2>
      <div class="subtitle">El revisor profesional aprende de cada error. ¡Vuelve a intentarlo!</div>
      
      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-value">${state.levelStats.correct}</div>
          <div class="result-stat-label">Aciertos</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${state.levelStats.wrong}</div>
          <div class="result-stat-label">Errores</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${state.currentIndex}/${state.exerciseQueue.length}</div>
          <div class="result-stat-label">Progreso</div>
        </div>
      </div>
      
      <button class="btn-primary" onclick="startLevel(${state.level})">Reintentar</button>
      <button class="btn-secondary" onclick="renderHome()">Volver al menú</button>
    </div>
  `;
  
  updateHeader();
}

function confirmExit() {
  if (confirm('¿Salir del nivel? Perderás el progreso actual.')) {
    renderHome();
  }
}

// ============================================================
// INIT
// ============================================================

(async function init() {
  await loadProgress();
  renderHome();
})();
</script>

</body>
</html>
